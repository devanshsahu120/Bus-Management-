<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buses - NMIMS Indore</title>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
</head>
<body>
  <nav>
    <div class="logo">
      <img src="nmims-university-logo-2.png" alt="NMIMS Indore Logo">
    </div>
    <div>
      <a href="index.html">Home</a>
      <a href="schedule.html">Schedule</a>
      <a href="buses.html">Buses</a>
      <a href="bus-pass.html">Bus Pass</a>
    </div>
    <div class="profile-icon" onclick="toggleProfileDropdown()">
      <i class="fas fa-user-circle"></i>
    </div>
    <div class="profile-dropdown" id="profile-dropdown" style="display: none;">
      <h3>Your Profile</h3>
      <div id="profile-content"></div>
    </div>
  </nav>

  <h1>Buses</h1>
  <table class="schedule-table" id="busTable">
    <thead>
      <tr>
        <th>Bus Number</th>
        <th>Registration</th>
        <th>Capacity</th>
        <th>Active</th>
      </tr>
    </thead>
    <tbody id="busBody">
      <!-- Filled by JS -->
    </tbody>
  </table>

  <script>
    fetch('/buses')
      .then(res => res.json())
      .then(data => {
        const tbody = document.getElementById("busBody");
        data.forEach(bus => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${bus.bus_number}</td>
            <td>${bus.registration_number}</td>
            <td>${bus.capacity}</td>
            <td>${bus.is_active ? 'Yes' : 'No'}</td>
          `;
          tbody.appendChild(row);
        });
      });
  </script>
</body>
</html>
